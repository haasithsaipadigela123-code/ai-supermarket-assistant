<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — SuperMart AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-page">
  <div class="auth-card" style="max-width:480px;">
    <div class="auth-logo">
      <i class="fa-solid fa-cart-shopping"></i>
      <h1>Create Account</h1>
      <p>Set up your supermarket dashboard</p>
    </div>
    {% if errors %}
    <div class="alert-box danger" style="margin-bottom:16px;flex-direction:column;align-items:flex-start;">
      {% for e in errors %}<div style="display:flex;gap:8px;align-items:center;"><i class="fa-solid fa-circle-exclamation" style="color:#ef4444;"></i><span>{{ e }}</span></div>{% endfor %}
    </div>
    {% endif %}
    <form method="POST">
      <div class="form-row form-row-2">
        <div class="form-group">
          <label class="form-label">Admin Name</label>
          <input type="text" name="admin_name" class="form-input" placeholder="Your name" required value="{{ form.admin_name if form else '' }}"/>
        </div>
        <div class="form-group">
          <label class="form-label">Supermarket Name</label>
          <input type="text" name="supermarket" class="form-input" placeholder="Store name" required value="{{ form.supermarket if form else '' }}"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="Lowercase, no spaces" required value="{{ form.username if form else '' }}"/>
      </div>
      <div class="form-row form-row-2">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="Min 6 chars" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-input" placeholder="Repeat password" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;">
        <i class="fa-solid fa-user-plus"></i> Create Account
      </button>
    </form>
    <div class="auth-footer">Already have an account? <a href="/">Sign in</a></div>
  </div>
</body>
</html>
